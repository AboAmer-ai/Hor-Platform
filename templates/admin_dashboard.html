<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body{
    font-family:"Tajawal",sans-serif;
    background:#f8fafc;
    margin:0;
}

/* HEADER */
header{
    background:#5b21b6;
    color:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    text-align:center;
}

/* TABLE */
table{
    width:100%;
    margin-top:20px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:center;
}

/* ACTION BUTTONS */
.btn{
    padding:6px 12px;
    border-radius:8px;
    font-size:13px;
    display:inline-block;
}

.btn-delete{
    background:#ef4444;
    color:#fff;
}

.btn-toggle{
    background:#5b21b6;
    color:#fff;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<header>
    <h3>لوحة التحكم</h3>

    <!-- إصلاح اللوج أوت -->
    <a href="{{ url_for('admin_logout') }}" style="color:#fff;">
        تسجيل خروج
    </a>
</header>

<div class="container">

<div class="cards">
    <div class="card">
        <h2>{{ jobs|length }}</h2>
        <p>الوظائف</p>
    </div>

    <div class="card">
        <h2>{{ subs|length }}</h2>
        <p>المشتركين</p>
    </div>

    <div class="card">
        <h2>✔</h2>
        <p>النظام يعمل</p>
    </div>
</div>

<h3>آخر الوظائف</h3>

<table>
<tr>
<th>العنوان</th>
<th>التصنيف</th>
<th>الحالة</th>
<th>الإجراءات</th>
</tr>

{% for job in jobs %}
<tr>
<td>{{ job.title }}</td>
<td>{{ job.category }}</td>
<td>{{ job.status }}</td>

<td>
    <a class="btn btn-toggle" href="/admin/job/toggle/{{ job.id }}">
        تغيير
    </a>

    <a class="btn btn-delete"
       href="/admin/job/delete/{{ job.id }}"
       onclick="return confirm('هل أنت متأكد؟')">
        حذف
    </a>
</td>

</tr>
{% endfor %}
</table>

</div>

</body>
</html>
