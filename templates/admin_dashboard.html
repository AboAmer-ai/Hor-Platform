<table>
<tr>
<th>العنوان</th>
<th>التصنيف</th>
<th>الحالة</th>
<th>الإجراءات</th>
</tr>

{% for job in jobs %}
<tr>
<td>{{ job.title }}</td>
<td>{{ job.category }}</td>
<td>{{ job.status }}</td>

<td>
    <a href="/admin/job/toggle/{{ job.id }}" style="margin-left:10px;">
        تغيير الحالة
    </a>

    <a href="/admin/job/delete/{{ job.id }}" 
       onclick="return confirm('هل أنت متأكد من الحذف؟')" 
       style="color:red;">
        حذف
    </a>
</td>

</tr>
{% endfor %}
</table>
