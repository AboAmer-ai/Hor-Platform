<h2>إدارة الوظائف</h2>

<table border="1" width="100%">
<tr>
<th>العنوان</th>
<th>التصنيف</th>
<th>الإجراء</th>
</tr>

{% for job in jobs %}
<tr>
<td>
    <a href="/admin/job/delete/{{ job.id }}">🗑 حذف</a> |
    <a href="/admin/job/toggle/{{ job.id }}">
        {% if job.status == 'active' %}
            🙈 إخفاء
        {% else %}
            👁 إظهار
        {% endif %}
    </a>
</td>
</tr>
{% endfor %}
</table>
