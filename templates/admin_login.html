<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الأدمن</title>
    <style>
        body{
            font-family: "Tajawal", sans-serif;
            background:#f4f4f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .box{
            background:#fff;
            padding:30px;
            border-radius:16px;
            width:320px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }
        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:10px;
            border:1px solid #ddd;
        }
        button{
            width:100%;
            margin-top:15px;
            padding:12px;
            background:#5b21b6;
            color:#fff;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 دخول لوحة التحكم</h2>

    <form method="POST">
        <input type="password" name="password" placeholder="كلمة المرور">
        <button type="submit">دخول</button>
    </form>
</div>

</body>
</html>
